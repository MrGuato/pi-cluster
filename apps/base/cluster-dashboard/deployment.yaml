apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-dashboard
  template:
    metadata:
      labels:
        app: cluster-dashboard
    spec:
      containers:
        - name: nginx
          image: ghcr.io/mrguato/cluster-dashboard:v4.2.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: metrics-data
              mountPath: /usr/share/nginx/html/api
              readOnly: true

        - name: metrics-collector
          image: alpine:3.20
          command: ["/bin/sh", "/scripts/collect.sh"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 96Mi
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: metrics-data
              mountPath: /data
            - name: collector-script
              mountPath: /scripts
              readOnly: true

      volumes:
        - name: metrics-data
          emptyDir: {}
        - name: collector-script
          configMap:
            name: metrics-collector-script
            defaultMode: 0555
