---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: headlamp
      version: 0.41.0          # immutable; Renovate will PR bumps
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: headlamp
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
    cleanupOnFail: true
  driftDetection:
    mode: enabled
  values:
    # ---- Image ---------------------------------------------------------------
    image:
      pullPolicy: IfNotPresent

    replicaCount: 1

    config:
      inCluster: true
      pluginsDir: /build/plugins

    serviceAccount:
      create: true
      name: headlamp
    clusterRoleBinding:
      create: true
      clusterRoleName: view

    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/arch
                  operator: In
                  values: [amd64, arm64]

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # ---- Pod security --------------------------------------------------------
    podSecurityContext:
      runAsNonRoot: true
      fsGroup: 101
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop: [ALL]

    volumes:
      - name: home
        emptyDir: {}
      - name: tmp
        emptyDir: {}
    volumeMounts:
      - name: home
        mountPath: /home/headlamp
      - name: tmp
        mountPath: /tmp  

    livenessProbe:
      httpGet:
        path: /
        port: http
      initialDelaySeconds: 30
      periodSeconds: 30
    readinessProbe:
      httpGet:
        path: /
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10

    service:
      type: ClusterIP
      port: 80

    ingress:
      enabled: false

    podAnnotations:
      app.kubernetes.io/managed-by: flux
    commonLabels:
      app.kubernetes.io/part-of: platform
