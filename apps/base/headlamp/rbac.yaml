---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-login
  namespace: headlamp
  labels:
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/component: login-identity
---
apiVersion: v1
kind: Secret
metadata:
  name: headlamp-login-token
  namespace: headlamp
  annotations:
    kubernetes.io/service-account.name: headlamp-login
  labels:
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/component: login-identity
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-login-view
  labels:
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/component: login-identity
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: headlamp-login
    namespace: headlamp
