apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: "1.10.2"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn-system
      interval: 12h
  values:
    # Only create default disks on nodes we explicitly label
    defaultSettings:
      defaultReplicaCount: 2
      createDefaultDiskLabeledNodes: true
      defaultDataPath: /var/lib/longhorn/
      # Don't fight with local-path for default StorageClass
      defaultDataLocality: disabled
      # Schedule replicas only on nodes with storage label
      storageMinimalAvailablePercentage: 15
      defaultLonghornStaticStorageClass: longhorn-static

    persistence:
      defaultClassReplicaCount: 2
      defaultClass: false

    metrics:
      serviceMonitor:
        enabled: true

    # Longhorn UI — we'll expose this through Cloudflare later
    longhornUI:
      replicas: 1
